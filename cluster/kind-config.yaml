# =============================================================================
# Kind Cluster Configuration
# File: platform-infra/cluster/kind-config.yaml
#
# NODE LAYOUT (4 nodes total):
#
#   control-plane         — API server, scheduler, etcd, port mappings
#   worker (shared-svcs)  — Traefik, Flux controllers (shared services)
#   worker (app-1)        — Airline API pods
#   worker (app-2)        — PostgreSQL StatefulSet + PVC
#
# LABELS (baked in via kubeletExtraArgs — no manual kubectl label needed):
#   worker 1:  node-role=shared-services
#              node-role.kubernetes.io/shared-services=
#   worker 2:  node-role=app
#              node-role.kubernetes.io/app=
#   worker 3:  node-role=app
#              node-role.kubernetes.io/app=
#
#   node-role=<value>
#     Our custom label — used by nodeSelector in Helm charts and
#     Flux controller patches to pin workloads to the right node tier.
#
#   node-role.kubernetes.io/<value>=
#     The Kubernetes display label — makes kubectl get nodes show
#     the ROLES column correctly instead of <none>.
#
# TAINT on worker 1 (applied after cluster creation — cannot be set here):
#   kubectl taint node platform-local-worker node-role=shared-services:NoSchedule
#
# PORT MAPPINGS (control-plane → your Mac):
#   localhost:8080  → cluster :80    HTTP  — airline app via Traefik
#   localhost:8443  → cluster :443   HTTPS
#   localhost:9090  → cluster :9090  Traefik dashboard
#   localhost:30000 → cluster :30000 NodePort debug
#   localhost:30001 → cluster :30001 NodePort debug
# =============================================================================

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: platform-local

nodes:

  # -------------------------------------------------------------------------
  # Control Plane
  # Labeled ingress-ready so Traefik can bind to the host port mappings.
  # -------------------------------------------------------------------------
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
      - containerPort: 9090
        hostPort: 9090
        protocol: TCP
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      - containerPort: 30001
        hostPort: 30001
        protocol: TCP

  # -------------------------------------------------------------------------
  # Worker 1 — shared services
  # Scheduling label:  node-role=shared-services
  # Display label:     node-role.kubernetes.io/shared-services=
  # Taint applied after creation via kubectl taint (cannot be set here)
  # -------------------------------------------------------------------------
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-role=shared-services,node-role.kubernetes.io/shared-services="

  # -------------------------------------------------------------------------
  # Worker 2 — app tier (node 1 of 2)
  # Scheduling label:  node-role=app
  # Display label:     node-role.kubernetes.io/app=
  # -------------------------------------------------------------------------
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-role=app,node-role.kubernetes.io/app="

  # -------------------------------------------------------------------------
  # Worker 3 — app tier (node 2 of 2)
  # Scheduling label:  node-role=app
  # Display label:     node-role.kubernetes.io/app=
  # -------------------------------------------------------------------------
  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-role=app,node-role.kubernetes.io/app="
