# =============================================================================
# Flux Kustomization — apps folder
# Location: platform-infra/flux/clusters/local/flux-system/apps.yaml
#
# This tells Flux to watch the apps/ folder alongside flux-system/.
# Without this file Flux only watches flux-system/ — it does not
# automatically discover sibling folders.
#
# This is the "app-of-apps" pattern — the root Kustomization manages
# Flux itself, and this Kustomization manages all app deployments.
# =============================================================================

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  # How often Flux reconciles the apps folder
  interval: 1m

  # Where to find the apps manifests — relative to the repo root
  path: ./flux/clusters/local/apps

  # Automatically apply changes without manual approval
  prune: true

  # Reference to the GitRepository that Flux bootstrap created
  # This is the same source that watches platform-infra
  sourceRef:
    kind: GitRepository
    name: flux-system

  # Wait for all resources to be healthy before marking as ready
  wait: true
  timeout: 5m
